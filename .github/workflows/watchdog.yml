name: Watchdog - Multi Workflow Health Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gh jq

      - name: Checkout repo (for state persistence)
        uses: actions/checkout@v4

      - name: Initialize state file if missing
        run: |
          if [ ! -f watchdog_state.json ]; then
            echo '{}' > watchdog_state.json
          fi

      - name: Run watchdog monitoring
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          STATE_FILE="watchdog_state.json"
          workflows=("blank.yml" "worker-fleet-large.yml")

          state=$(cat "$STATE_FILE")
          new_state='{}'

          alerts=""
          recoveries=""

          for wf in "${workflows[@]}"; do

            echo "Checking workflow: $wf"

            latest=$(gh api repos/${{ github.repository }}/actions/workflows/$wf/runs \
              --jq '.workflow_runs[0]')

            # safeguard if no runs exist
            if [ "$latest" = "null" ] || [ -z "$latest" ]; then
              echo "No runs found for $wf"
              continue
            fi

            id=$(echo "$latest" | jq -r '.id')
            status=$(echo "$latest" | jq -r '.status')
            conclusion=$(echo "$latest" | jq -r '.conclusion')

            url="https://github.com/${{ github.repository }}/actions/runs/$id"

            prev=$(echo "$state" | jq -r --arg wf "$wf" '.[$wf] // "healthy"')

            # -------------------------
            # QUEUED DETECTED (RESTORED)
            # -------------------------
            if [ "$status" = "queued" ]; then

              alerts="$alerts\n🚨 QUEUED: $wf | $url"

              new_state=$(echo "$new_state" | jq --arg wf "$wf" '. + {($wf): "queued"}')

            # -------------------------
            # FAILURE DETECTED
            # -------------------------
            elif [ "$conclusion" = "failure" ]; then

              alerts="$alerts\n🚨 FAILURE DETECTED: $wf | $url"

              new_state=$(echo "$new_state" | jq --arg wf "$wf" '. + {($wf): "failed"}')

            # -------------------------
            # RECOVERY DETECTED
            # -------------------------
            elif [ "$conclusion" = "success" ] && [ "$prev" = "failed" ]; then

              recoveries="$recoveries\n✅ RECOVERED: $wf | $url"

              new_state=$(echo "$new_state" | jq --arg wf "$wf" '. + {($wf): "healthy"}')

            # -------------------------
            # NO CHANGE
            # -------------------------
            else
              new_state=$(echo "$new_state" | jq --arg wf "$wf" --arg prev "$prev" '. + {($wf): $prev}')
            fi

          done

          echo "$new_state" > "$STATE_FILE"

          {
            echo "alerts<<EOF"
            echo -e "$alerts"
            echo "EOF"
          } >> $GITHUB_ENV

          {
            echo "recoveries<<EOF"
            echo -e "$recoveries"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Send failure alerts
        if: env.alerts != ''
        env:
          alerts: ${{ env.alerts }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$alerts\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send recovery alerts
        if: env.recoveries != ''
        env:
          recoveries: ${{ env.recoveries }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$recoveries\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Commit updated state
        run: |
          git config user.name "watchdog-bot"
          git config user.email "watchdog@bot.local"
          git add watchdog_state.json || true
          git commit -m "update watchdog state" || true
          git push || true
